spring:
  application:
    name: oms-api
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://mysql:3306/oms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MYSQL_USER:oms}
    password: ${MYSQL_PASSWORD:oms}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  pattern:
    level: "%5p [${spring.application.name}] [%X{X-Correlation-Id}]"

security:
  jwt:
    secret: ${JWT_SECRET:change-me}
    issuer: ${JWT_ISSUER:buddies-oms}
    access-token-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_DAYS:7}

app:
  bootstrap:
    admin:
      enabled: ${BOOTSTRAP_ENABLED:true}
      email: ${BOOTSTRAP_ADMIN_EMAIL:admin@local}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:Admin@1234}
      sample-email: ${BOOTSTRAP_SAMPLE_EMAIL:user@local}
      sample-password: ${BOOTSTRAP_SAMPLE_PASSWORD:User@1234}
  security:
    cookie:
      secure: ${COOKIE_SECURE:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
