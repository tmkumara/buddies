spring:
  datasource:
    url: jdbc:mysql://mysql:3306/giftbox_oms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: giftbox
    password: giftbox
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration   # set true later when we add migrations

security:
  jwt:
    secret: ${JWT_SECRET}
    expirationMinutes: 120
    issuer: giftbox-oms

app:
  bootstrap:
    admin:
      enabled: true
      email: ${BOOTSTRAP_ADMIN_EMAIL}
      password: ${BOOTSTRAP_ADMIN_PASSWORD}
