version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: buddies-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: [
      "--default-authentication-plugin=mysql_native_password",
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci"
    ]

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: buddies-backend
    restart: unless-stopped
    depends_on:
      - mysql
    env_file:
      - ../.env
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      target: dev
    container_name: buddies-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ../.env
    environment:
      VITE_API_BASE_URL: http://backend:8080
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
