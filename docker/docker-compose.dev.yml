version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: giftbox-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: giftbox_oms
      MYSQL_USER: giftbox
      MYSQL_PASSWORD: giftbox
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: [
      "--default-authentication-plugin=mysql_native_password",
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci"
    ]

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: giftbox-backend
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_LOCATION: file:/runtime/config/
      JWT_SECRET: ${JWT_SECRET:-ZGV2LXNlY3JldA==}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-admin123}
    volumes:
      - ../runtime/config:/runtime/config:ro
    ports:
      - "8081:8080"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: giftbox-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  mysql_data:
